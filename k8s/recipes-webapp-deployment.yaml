apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipes-webapp
  labels:
    app: recipes-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recipes-webapp
  template:
    metadata:
      labels:
        app: recipes-webapp
    spec:
      containers:
      - name: webapp
        image: docker.io/library/recipes-webapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://recipeuser:recipemaster@recipes-db:5432/recipesdb"
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: recipes-webapp
spec:
  selector:
    app: recipes-webapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP